name: Mobile Test Suite

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/monthly-key-mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/monthly-key-mobile/**'

defaults:
  run:
    working-directory: apps/monthly-key-mobile

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/monthly-key-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Golden Tests
        run: npm run test:golden

      - name: Run Widget Tests
        run: npm run test:widget

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Run Performance Tests
        run: npm run test:performance

      - name: Run All Tests with Coverage
        run: npm run test:all

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          directory: apps/monthly-key-mobile/coverage
